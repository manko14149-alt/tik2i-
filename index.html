<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ご案内アカウント</title>
    <style>
        /* 今回はTikTokユーザーに馴染みやすいダークモード風のデザインに変更 */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: #121212; /* ダーク背景 */
            color: #ffffff;
            display: flex;
            flex-direction: column;
        }

        /* コンテナのクラス名を変更 */
        .app-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        /* ダークテーマのカードデザイン */
        .redirect-box {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 40px 20px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333333;
        }

        .title-text {
            font-size: 18px;
            margin: 0 0 15px 0;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 今回はくるくる回る円ではなく、プログレスバー（横に伸びる線）のアニメーションに変更 */
        .progress-bar {
            width: 80%;
            height: 4px;
            background-color: #333;
            margin: 0 auto 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #06C755;
            animation: loadingBar 1.5s ease-in-out infinite;
        }

        @keyframes loadingBar {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; transform: translateX(100%); }
        }

        .info-msg {
            font-size: 13px;
            color: #aaaaaa;
            margin: 0 0 30px 0;
            line-height: 1.6;
        }

        .manual-fallback {
            background-color: #2a2a2a;
            padding: 20px 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .manual-fallback p {
            color: #ff6b6b;
            font-size: 12px;
            font-weight: bold;
            margin: 0 0 15px 0;
        }

        /* アクションボタン（シャドウやクリック時の挙動を変更） */
        .action-btn {
            display: block;
            width: 100%;
            background-color: #06C755;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 15px 0;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .action-btn:active {
            background-color: #05a044;
        }

        /* フッターエリア */
        .bottom-area {
            padding: 20px 0;
            text-align: center;
        }

        .bottom-area a {
            color: #666666;
            text-decoration: none;
            font-size: 11px;
            margin: 0 8px;
        }
    </style>

</head>
<body>

    <div class="app-container">
        <div class="redirect-box">
            
            <h3 class="title-text">LINEアプリへ接続中</h3>
            
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            
            <p class="info-msg">
                システムが自動的にアプリを起動します。<br>
                画面を閉じずに数秒お待ちください。
            </p>

            <div class="manual-fallback">
                <p>※5秒待っても切り替わらない場合はこちら</p>
                <a href="https://lin.ee/DbrryZI" class="action-btn" target="_blank" rel="noopener">
                    LINEアプリを開く
                </a>
            </div>
            
        </div>
    </div>
    
    <div class="bottom-area">
        <a href="#">運営情報</a> | <a href="#">プライバシーポリシー</a> | <a href="#">利用規約</a>
    </div>

    <script>
        (function() {
            var urlToLoad = "https://lin.ee/DbrryZI";
            
            // リダイレクトを実行する関数
            var executeRedirect = function() {
                // 前回(850ms)から更にずらして900msに設定
                setTimeout(function() {
                    
                    // アプローチ1: 今回は assign() メソッドを使用
                    window.location.assign(urlToLoad);
                    
                    // アプローチ2: 弾かれた場合の追撃(0.4秒後)に href を使用
                    setTimeout(function() {
                        window.location.href = urlToLoad;
                    }, 400);

                }, 900);
            };

            // DOMContentLoadedよりさらに強力な読み込み判定ロジック
            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                executeRedirect();
            } else {
                document.addEventListener('DOMContentLoaded', executeRedirect);
            }
        })();
    </script>
</body>
</html>
